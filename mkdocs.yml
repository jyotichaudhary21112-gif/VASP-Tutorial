site_name: Advanced Materials Modeling Hub
site_description: A complete hands-on workflow manual for VASP calculations.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.top

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - admonition
  - details

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Theoretical Background:
      - Introduction to DFT: theory/dft-intro.md
      - XC Functionals: theory/xc-functionals.md
      - Elastic Tensor Theory: theory/elastic-theory.md
  - Hands-on Workflows:
      - Convergence Testing: vasp-basics/convergence.md
      - Structural Relaxation: vasp-basics/relaxation.md
      - Density of States: vasp-basics/dos.md
      - Mechanical Properties: vasp-basics/mechanical.md
